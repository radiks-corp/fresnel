name: App CD

on:
  workflow_dispatch:
  workflow_call:

jobs:
  app-deploy-prod:
    name: App Deploy Prod
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.reviewgpt.ca
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::REDACTED_ACCOUNT_ID:role/fresnel-github-deploy
          aws-region: us-east-1

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.reviewgpt.ca
          NODE_ENV: production
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Get Bucket Name
        uses: dkershner6/aws-ssm-getparameters-action@v2
        with:
          parameterPairs: '/prod/fresnel/app/bucket-name = APP_BUCKET_NAME'

      - name: Sync to S3
        run: aws s3 sync ./dist s3://$APP_BUCKET_NAME --delete

  invalidate-app-cloudfront:
    name: Invalidate App CloudFront
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    needs:
      - app-deploy-prod
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::REDACTED_ACCOUNT_ID:role/fresnel-github-deploy
          aws-region: us-east-1

      - name: Get CloudFront Distribution ID
        uses: dkershner6/aws-ssm-getparameters-action@v2
        with:
          parameterPairs: '/prod/fresnel/app/cloudfront-distribution-id = DISTRIBUTION'

      - name: Invalidate CloudFront Cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          PATHS: '/*'
          AWS_REGION: us-east-1
