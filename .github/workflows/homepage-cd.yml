name: Homepage CD

on:
  workflow_dispatch:
  workflow_call:

jobs:
  homepage-deploy-prod:
    name: Homepage Deploy Prod
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://reviewgpt.ca
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get Bucket Name
        uses: dkershner6/aws-ssm-getparameters-action@v2
        with:
          parameterPairs: '/prod/fresnel/homepage/bucket-name = HOMEPAGE_BUCKET_NAME'

      - name: Sync to S3
        run: aws s3 sync ./dist s3://$HOMEPAGE_BUCKET_NAME --delete

  invalidate-homepage-cloudfront:
    name: Invalidate Homepage CloudFront
    runs-on: ubuntu-latest
    needs:
      - homepage-deploy-prod
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get CloudFront Distribution ID
        uses: dkershner6/aws-ssm-getparameters-action@v2
        with:
          parameterPairs: '/prod/fresnel/homepage/cloudfront-distribution-id = DISTRIBUTION'

      - name: Invalidate CloudFront Cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          PATHS: '/*'
          AWS_REGION: us-east-1
